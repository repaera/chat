# Publish — builds a multi-arch Docker image and pushes to GHCR.
# Triggered by:
#   - Every push to main → :latest + :<short-sha>
#   - A semver tag push (e.g. 0.1.0) → :latest + :<short-sha> + :0.1.0
#
# Tagging workflow:
#   git tag 0.1.0 && git push origin 0.1.0
#
# One-time setup (do this before first push):
#   Repo → Settings → Actions → General → Workflow permissions → Read and write
#   After first publish: Packages → <image> → Package settings → Change visibility → Public

name: Publish

on:
  push:
    branches: [main]
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:latest,${IMAGE}:${SHORT_SHA}"
          # If triggered by a semver tag, add it as an additional tag
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            VERSION="${REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "revision=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
