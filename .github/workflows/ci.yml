# CI — runs on non-main branch pushes and pull requests.
# Calls the reusable test.yml workflow (lint, type check, unit tests).
# Main branch and tag pushes are handled by publish.yml (tests + build + push).

name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    uses: ./.github/workflows/test.yml
